[project]
name = "memtomem"
version = "0.1.10"
description = "Markdown-first memory infrastructure for AI agents with hybrid search"
authors = [
    {name = "DAPADA Inc.", email = "contact@dapada.co.kr"},
    {name = "memtomem contributors"},
]
license = {text = "Apache-2.0"}
keywords = ["memory", "ai", "mcp", "agent", "rag", "embedding", "search", "markdown"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.26.0",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "sqlite-vec>=0.1.6",
    "httpx>=0.28",
    "watchdog>=6.0",
    "click>=8.1",
    "pathspec>=0.12",
]

[project.optional-dependencies]
onnx = ["fastembed>=0.8,<0.9"]
ollama = ["ollama>=0.4"]
openai = ["openai>=1.60"]
korean = ["kiwipiepy>=0.18"]
code = [
    "tree-sitter>=0.25",
    "tree-sitter-python>=0.23",
    "tree-sitter-javascript>=0.23",
    "tree-sitter-typescript>=0.23",
]
web = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
]
all = ["memtomem[onnx,ollama,openai,korean,code,web]"]

[project.scripts]
memtomem = "memtomem.cli:cli"
mm = "memtomem.cli:cli"
memtomem-server = "memtomem.server:main"
memtomem-web = "memtomem.web.app:main"

[project.urls]
Homepage = "https://github.com/memtomem/memtomem"
Repository = "https://github.com/memtomem/memtomem"
Issues = "https://github.com/memtomem/memtomem/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/memtomem"]
