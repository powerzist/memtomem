name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # schedule:
  #   - cron: "17 5 * * *"   # nightly — enable once LLM secrets are provisioned

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run ruff check packages/memtomem/src packages/memtomem/tests tools
      - run: uv run ruff format --check packages/memtomem/src packages/memtomem/tests tools

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - name: mypy (gradual)
        run: uv run mypy packages/memtomem/src
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: >-
          uv run pytest
          --ignore=packages/memtomem/tests/test_golden_path.py
          -m "not ollama and not llm"
          --tb=short -q

  test-golden-path:
    name: golden-path (ONNX bge-m3)
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed-cache
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Cache fastembed model (paraphrase-multilingual-MiniLM-L12-v2, ~220 MB)
        uses: actions/cache@v5
        with:
          path: ${{ env.FASTEMBED_CACHE_PATH }}
          key: ${{ runner.os }}-fastembed-multilingual-minilm-l12
      - run: uv sync --frozen
      - run: uv run pytest packages/memtomem/tests/test_golden_path.py --tb=short -q

  test-llm-nightly:
    name: llm-nightly (optional)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest -m "llm" --tb=short -q

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --frozen
      - run: uv run pytest packages/memtomem/tests/test_notebooks.py --tb=short -q
